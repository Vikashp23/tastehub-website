<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TasteHub</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=DM+Sans&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans';background:#FFF8F0}

nav{text-align:center;padding:12px;background:#fff}
nav img{height:60px}

.hero{text-align:center;padding:20px}
.hero h1{font-family:'Playfair Display';font-size:28px}

button{padding:10px 20px;margin:5px;border:none;border-radius:20px;cursor:pointer;font-weight:600}
.primary{background:#2C1810;color:white}
.orange{background:#E8611A;color:white}

.badge{
display:inline-block;
margin-top:10px;
padding:6px 14px;
border-radius:20px;
font-weight:bold;
color:white;
background:gray;
}

section{padding:20px}

.tab-btn{
padding:8px 15px;
border:1px solid #ccc;
margin:5px;
border-radius:20px;
background:#fff
}
.active{background:#E8611A;color:white}

.meal{
background:#fff;
padding:15px;
margin:10px 0;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.05)
}

.price{color:#E8611A;font-weight:bold}

/* ADMIN PANEL */
.admin{
background:#fff;
padding:15px;
border-radius:12px;
margin:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.05)
}

input,select{
width:100%;
padding:10px;
margin:5px 0;
border:1px solid #ddd;
border-radius:8px;
}

.admin-btn{
background:#2C1810;
color:white;
width:100%;
}

.delete-btn{
background:red;
color:white;
padding:5px 10px;
border-radius:10px;
font-size:12px;
float:right;
}

.cart{
position:fixed;
bottom:15px;
right:15px;
background:#E8611A;
color:white;
padding:14px;
border-radius:30px;
cursor:pointer;
}

footer{
text-align:center;
background:#2C1810;
color:white;
padding:20px;
margin-top:20px
}
</style>
</head>

<body>

<nav>
<img src="logo.png">
</nav>

<div class="hero">
<h1>TasteHub 🍽</h1>

<div id="statusBadge" class="badge">Loading...</div>

<br><br>

<button class="orange" onclick="toggleAdmin()">Admin Panel</button>
</div>

<!-- MENU -->
<section>
<h2>Menu</h2>

<button class="tab-btn active" onclick="show('breakfast',this)">Breakfast</button>
<button class="tab-btn" onclick="show('lunch',this)">Lunch</button>
<button class="tab-btn" onclick="show('snacks',this)">Snacks</button>
<button class="tab-btn" onclick="show('dinner',this)">Dinner</button>

<div id="menu"></div>
</section>

<!-- ADMIN PANEL -->
<section id="adminPanel" class="admin" style="display:none">
<h3>Admin Panel (No Coding)</h3>

<select id="category">
<option value="breakfast">Breakfast</option>
<option value="lunch">Lunch</option>
<option value="snacks">Snacks</option>
<option value="dinner">Dinner</option>
</select>

<input id="itemName" placeholder="Food Item Name">
<input id="itemPrice" placeholder="Price">

<button class="admin-btn" onclick="addItem()">Add Item</button>

<hr><br>
<h4>Current Items</h4>
<div id="adminList"></div>
</section>

<div class="cart" onclick="orderNow()">🛒 Order</div>

<footer>© 2026 TasteHub</footer>

<script>
let cart = [];

/* LOAD OR DEFAULT DATA */
let data = JSON.parse(localStorage.getItem("menuData")) || {
 breakfast: [],
 lunch: [],
 snacks: [],
 dinner: []
};

function save(){
 localStorage.setItem("menuData", JSON.stringify(data));
}

/* SHOW MENU */
function show(type,btn){
 document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
 btn.classList.add('active');

 let html="";

 if(data[type].length===0){
  html="<b style='color:gray'>No items added</b>";
 }else{
  data[type].forEach((item,i)=>{
   html+=`
   <div class="meal">
   <h4>${item.name}
   <span class="delete-btn" onclick="deleteItem('${type}',${i})">X</span>
   </h4>
   <div class="price">₹${item.price}</div>
   </div>`;
  });
 }

 document.getElementById("menu").innerHTML=html;
}

/* ADD ITEM */
function addItem(){
 let cat=document.getElementById("category").value;
 let name=document.getElementById("itemName").value;
 let price=document.getElementById("itemPrice").value;

 if(!name || !price) return alert("Fill all fields");

 data[cat].push({name,price});
 save();

 document.getElementById("itemName").value="";
 document.getElementById("itemPrice").value="";

 renderAdmin();
 show(cat,document.querySelector('.tab-btn.active'));
}

/* DELETE */
function deleteItem(cat,index){
 data[cat].splice(index,1);
 save();
 renderAdmin();
 show(cat,document.querySelector('.tab-btn.active'));
}

/* ADMIN LIST */
function renderAdmin(){
 let html="";

 Object.keys(data).forEach(cat=>{
  data[cat].forEach((item,i)=>{
   html+=`<p>${cat.toUpperCase()} - ${item.name} ₹${item.price}</p>`;
  });
 });

 document.getElementById("adminList").innerHTML=html;
}

/* TOGGLE ADMIN */
function toggleAdmin(){
 let panel=document.getElementById("adminPanel");
 panel.style.display = panel.style.display==="none" ? "block" : "none";
 renderAdmin();
}

/* LIVE STATUS */
function updateBadge(){
 let h=new Date().getHours();
 let open = h<21;

 let badge=document.getElementById("statusBadge");

 if(open){
  badge.innerText="🟢 Open Now";
  badge.style.background="#1aa34a";
 }else{
  badge.innerText="🔴 Closed Now";
  badge.style.background="#d93025";
 }
}

setInterval(updateBadge,60000);
updateBadge();

/* INIT */
show('breakfast',document.querySelector('.tab-btn'));
</script>

</body>
</html>
