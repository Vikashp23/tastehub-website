<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>TasteHub Admin · Menu Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#FFF8F0;--brown:#2C1810;--orange:#E8611A;--muted:#7A5C4A;
  --border:rgba(44,24,16,.12);--r:14px;
  --font:'DM Sans',system-ui,sans-serif;--display:'Playfair Display',Georgia,serif;
}
body{font-family:var(--font);background:var(--cream);color:var(--brown);min-height:100vh}
.wrap{max-width:760px;margin:0 auto;padding:24px 16px 60px}
h1{font-family:var(--display);font-size:24px;margin-bottom:4px}
.sub{color:var(--muted);font-size:13px;margin-bottom:24px}
.card{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:20px;box-shadow:0 4px 18px rgba(44,24,16,.06)}
.card h3{font-family:var(--display);font-size:16px;margin-bottom:14px}
label{font-size:12px;font-weight:700;color:var(--muted);display:block;margin-bottom:5px;letter-spacing:.2px}
input,select{
  width:100%;background:#fff;border:1.5px solid var(--border);color:var(--brown);
  border-radius:10px;padding:10px 12px;font-size:14px;font-family:var(--font);margin-bottom:14px;outline:none;
}
input:focus,select:focus{border-color:var(--orange)}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.check-row{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.check-row input{width:auto;margin:0}
button{
  font-family:var(--font);cursor:pointer;border:none;border-radius:10px;
  padding:11px 18px;font-weight:700;font-size:13.5px;transition:all .15s;
}
.btn-primary{background:var(--orange);color:#fff;box-shadow:0 4px 14px rgba(232,97,26,.28)}
.btn-primary:hover{background:#d4551a}
.btn-danger{background:#fdeceb;color:#c0392b}
.btn-danger:hover{background:#fbdcd9}
.btn-save{background:var(--brown);color:#fff}
.btn-save:hover{background:#1a0c06}
.btn-sm{padding:7px 12px;font-size:12px}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
.tab-btn{padding:8px 16px;border-radius:99px;border:1.5px solid var(--border);background:#fff;color:var(--muted);font-weight:600;font-size:12.5px}
.tab-btn.active{background:var(--orange);border-color:var(--orange);color:#fff}
.item-row{
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:12px;border:1px solid var(--border);border-radius:12px;margin-bottom:8px;background:var(--cream);
}
.item-info{min-width:0}
.item-name{font-weight:600;font-size:13.5px}
.item-price{color:var(--orange);font-weight:700;font-size:13px}
.badge{display:inline-block;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:99px;margin-left:6px}
.badge.on{background:rgba(27,140,90,.12);color:#136843}
.badge.off{background:rgba(120,100,80,.12);color:var(--muted)}
.item-actions{display:flex;gap:6px;flex:0 0 auto}
.toggle-btn{padding:6px 10px;font-size:11px;border-radius:8px;border:1.5px solid var(--border);background:#fff;color:var(--brown)}
.login-box{max-width:340px;margin:80px auto;text-align:center}
.login-box h2{font-family:var(--display);margin-bottom:18px}
.status{font-size:12px;color:var(--muted);margin-top:10px;text-align:center}
.status.error{color:#c0392b}
.status.success{color:#136843}
.hidden{display:none}
.loader{text-align:center;padding:30px;color:var(--muted)}
</style>
</head>
<body>

<div class="wrap">

  <div id="loginScreen" class="login-box">
    <h2>🔒 TasteHub Admin</h2>
    <label>Admin Password</label>
    <input type="password" id="loginPass" placeholder="Enter password" onkeydown="if(event.key==='Enter')login()"/>
    <button class="btn-primary" style="width:100%" onclick="login()">Login</button>
    <div class="status" id="loginStatus"></div>
  </div>

  <div id="adminPanel" class="hidden">
    <h1>🍽 TasteHub Admin</h1>
    <p class="sub">Manage today's menu — changes reflect on the live website instantly.</p>

    <div class="card">
      <h3>➕ Add New Item</h3>
      <label>Meal Category</label>
      <select id="newMeal">
        <option value="breakfast">🌅 Breakfast</option>
        <option value="lunch">☀️ Lunch</option>
        <option value="snacks">🍿 Snacks</option>
        <option value="dinner">🌙 Dinner</option>
      </select>
      <label>Item Name</label>
      <input id="newName" placeholder="e.g. Masala Dosa"/>
      <div class="row">
        <div>
          <label>Price (₹)</label>
          <input id="newPrice" type="number" placeholder="130"/>
        </div>
        <div>
          <label style="margin-bottom:14px;display:block">&nbsp;</label>
          <div class="check-row">
            <input type="checkbox" id="newAvailable" checked/>
            <label style="margin:0">Available today</label>
          </div>
        </div>
      </div>
      <button class="btn-primary" onclick="addItem()">Add Item</button>
      <div class="status" id="addStatus"></div>
    </div>

    <div class="tabs" id="mealTabs"></div>

    <div class="card">
      <h3 id="listTitle">🌅 Breakfast Items</h3>
      <div id="itemList"><div class="loader">Loading menu...</div></div>
    </div>
  </div>

</div>

<script>
const SHEET_API = "https://script.google.com/macros/s/AKfycbyOFJ2Om_4EtBuYnWqmtUEFaDiZIGFQWlssXGYZ-B_MSJESygHr4JAXbjuhTYPKMqkf/exec";

let ADMIN_PASSWORD = "";
let MENU = {};
let activeMeal = "breakfast";

function login() {
  const pass = document.getElementById("loginPass").value.trim();
  const statusEl = document.getElementById("loginStatus");
  if (!pass) {
    statusEl.textContent = "Please enter the password";
    statusEl.className = "status error";
    return;
  }
  ADMIN_PASSWORD = pass;
  sessionStorage.setItem("th_admin_pass", pass);
  document.getElementById("loginScreen").classList.add("hidden");
  document.getElementById("adminPanel").classList.remove("hidden");
  loadMenu();
}

// auto-login if password already verified this session
window.addEventListener("load", () => {
  const saved = sessionStorage.getItem("th_admin_pass");
  if (saved) {
    ADMIN_PASSWORD = saved;
    document.getElementById("loginScreen").classList.add("hidden");
    document.getElementById("adminPanel").classList.remove("hidden");
    loadMenu();
  }
});

async function loadMenu() {
  try {
    const res = await fetch(SHEET_API);
    MENU = await res.json();
    renderTabs();
    renderList();
  } catch (err) {
    document.getElementById("itemList").innerHTML = `<div class="status error">Failed to load menu. Check your internet connection.</div>`;
  }
}

function renderTabs() {
  const tabs = [
    { key: "breakfast", label: "🌅 Breakfast" },
    { key: "lunch", label: "☀️ Lunch" },
    { key: "snacks", label: "🍿 Snacks" },
    { key: "dinner", label: "🌙 Dinner" },
  ];
  document.getElementById("mealTabs").innerHTML = tabs.map(t => `
    <button class="tab-btn ${t.key === activeMeal ? 'active' : ''}" onclick="switchMeal('${t.key}')">${t.label}</button>
  `).join("");
}

function switchMeal(key) {
  activeMeal = key;
  renderTabs();
  renderList();
}

function renderList() {
  const titles = { breakfast: "🌅 Breakfast Items", lunch: "☀️ Lunch Items", snacks: "🍿 Snacks Items", dinner: "🌙 Dinner Items" };
  document.getElementById("listTitle").textContent = titles[activeMeal];

  const items = MENU[activeMeal]?.items || [];
  const list = document.getElementById("itemList");

  if (items.length === 0) {
    list.innerHTML = `<div class="status">No items yet in this category.</div>`;
    return;
  }

  list.innerHTML = items.map(item => `
    <div class="item-row">
      <div class="item-info">
        <span class="item-name">${escapeHtml(item.name)}</span>
        <span class="badge ${item.available ? 'on' : 'off'}">${item.available ? 'Available' : 'Off'}</span>
        <div class="item-price">₹${item.price}</div>
      </div>
      <div class="item-actions">
        <button class="toggle-btn" onclick="toggleAvailable(${item.row}, ${!item.available})">
          ${item.available ? 'Mark Off' : 'Mark On'}
        </button>
        <button class="btn-danger btn-sm" onclick="deleteItem(${item.row})">Delete</button>
      </div>
    </div>
  `).join("");
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

async function addItem() {
  const meal = document.getElementById("newMeal").value;
  const name = document.getElementById("newName").value.trim();
  const price = document.getElementById("newPrice").value;
  const available = document.getElementById("newAvailable").checked;
  const statusEl = document.getElementById("addStatus");

  if (!name || !price) {
    statusEl.textContent = "Please fill item name and price";
    statusEl.className = "status error";
    return;
  }

  statusEl.textContent = "Adding...";
  statusEl.className = "status";

  const result = await callApi({
    action: "add",
    meal, name, price: Number(price), available
  });

  if (result.success) {
    statusEl.textContent = "✅ Item added!";
    statusEl.className = "status success";
    document.getElementById("newName").value = "";
    document.getElementById("newPrice").value = "";
    activeMeal = meal;
    await loadMenu();
  } else {
    statusEl.textContent = "❌ " + (result.error || "Failed to add item");
    statusEl.className = "status error";
  }
}

async function toggleAvailable(row, newAvailable) {
  const result = await callApi({ action: "toggleAvailable", row, available: newAvailable });
  if (result.success) {
    await loadMenu();
  } else {
    alert("Failed: " + (result.error || "unknown error"));
  }
}

async function deleteItem(row) {
  if (!confirm("Delete this item permanently?")) return;
  const result = await callApi({ action: "delete", row });
  if (result.success) {
    await loadMenu();
  } else {
    alert("Failed: " + (result.error || "unknown error"));
  }
}

async function callApi(payload) {
  payload.password = ADMIN_PASSWORD;
  try {
    const res = await fetch(SHEET_API, {
      method: "POST",
      headers: { "Content-Type": "text/plain" }, // avoids CORS preflight on Apps Script
      body: JSON.stringify(payload)
    });
    return await res.json();
  } catch (err) {
    return { success: false, error: "Network error" };
  }
}
</script>
</body>
</html>
