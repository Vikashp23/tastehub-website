<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>TasteHub Premium</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:
    linear-gradient(rgba(255,247,235,.9),rgba(255,247,235,.9)),
    url("COVER.png") center/cover fixed;
}

/* HEADER */
.appbar{
  display:flex;
  justify-content:space-between;
  padding:12px;
  background:#fff;
}
.chip{padding:6px 10px;border-radius:20px;font-size:12px;}
.green{background:#e6f6ef;color:#176947;}
.orange{background:#fff3e0;color:#b56f00;}

/* BANNER */
.banner img{
  width:100%;
  border-radius:16px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:10px;
  padding:10px;
}
.panel{
  background:#fff;
  border-radius:12px;
  padding:12px;
}

/* TABS */
.tabs{
  display:flex;
  gap:10px;
  overflow:auto;
}
.tab{
  padding:8px 12px;
  border-radius:20px;
  border:1px solid #ddd;
  cursor:pointer;
}
.tab.active{
  background:#1f9f68;
  color:#fff;
}

/* ITEMS */
.item{
  display:flex;
  justify-content:space-between;
  padding:10px;
  margin-top:8px;
  background:#fafafa;
  border-radius:10px;
}
button{
  background:#1f9f68;
  color:#fff;
  border:none;
  padding:6px 10px;
  border-radius:8px;
}

/* CART */
.cartBar{
  position:fixed;
  bottom:0;
  width:100%;
  background:#fff;
  padding:10px;
  display:none;
  justify-content:space-between;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="appbar">
  <div>
    <b>TasteHub</b><br>
    <small>Discover a new taste</small>
  </div>
  <div>
    <span class="chip green">Available Now</span>
    <span class="chip orange">100% Veg</span>
  </div>
</div>

<!-- BANNER -->
<div class="banner">
  <img src="ad 2.png">
</div>

<!-- MAIN -->
<div class="grid">

  <!-- LEFT -->
  <div class="panel">
    <h3>Menu</h3>

    <div class="tabs">
      <div class="tab active" data-tab="breakfast">Breakfast</div>
      <div class="tab" data-tab="lunch">Lunch</div>
      <div class="tab" data-tab="snacks">Snacks</div>
      <div class="tab" data-tab="dinner">Dinner</div>
      <div class="tab" data-tab="sweets">Sweets</div>
    </div>

    <div id="menu"></div>
  </div>

  <!-- RIGHT -->
  <div class="panel">
    <h3>Quick Contact</h3>
    <a href="https://wa.me/919632035612">WhatsApp</a>

    <h4>How to order</h4>
    <p>1) Select items<br>2) Checkout<br>3) WhatsApp</p>
  </div>

</div>

<!-- CART -->
<div class="cartBar" id="cartBar">
  <div id="count">0 items</div>
  <button onclick="checkout()">Checkout</button>
</div>

<script>
let tab="breakfast";
let cart=[];

let menu={
 breakfast:[
  {n:"Idli",p:40,a:true},
  {n:"Dosa",p:60,a:true}
 ],
 lunch:[
  {n:"Veg Thali",p:120,a:true}
 ],
 snacks:[
  {n:"Samosa",p:20,a:true}
 ],
 dinner:[
  {n:"Chapati + Paneer",p:140,a:true}
 ],
 sweets:[
  {n:"Rasgulla",p:25,a:true},
  {n:"Gujiya",p:30,a:true}
 ]
};

/* AUTO CLOSE BREAKFAST */
let h=new Date().getHours();
if(h>=10){
  menu.breakfast.forEach(i=>i.a=false);
}

/* LOAD MENU */
function load(){
 let box=document.getElementById("menu");
 box.innerHTML="";

 menu[tab].forEach(i=>{
  box.innerHTML+=`
  <div class="item">
    <div>
      ${i.n} ₹${i.p}<br>
      ${i.a?"✅ Available":"❌ Closed"}
    </div>
    <button ${!i.a?"disabled":""}
     onclick="add('${i.n}',${i.p})">Add</button>
  </div>`;
 });
}

/* TAB SWITCH */
document.querySelectorAll(".tab").forEach(t=>{
 t.onclick=function(){
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
  this.classList.add("active");
  tab=this.dataset.tab;
  load();
 }
});

/* ADD CART */
function add(n,p){
 cart.push({n,p});
 document.getElementById("cartBar").style.display="flex";
 document.getElementById("count").innerText=cart.length+" items";
}

/* CHECKOUT */
function checkout(){
 let msg="Order:%0A";
 cart.forEach(i=>msg+=i.n+" ₹"+i.p+"%0A");
 window.open("https://wa.me/919632035612?text="+msg);
}

load();
</script>

</body>
</html>
