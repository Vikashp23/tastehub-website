<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>TasteHub | Kannuru Nearby</title>
<meta name="description" content="TasteHub – Homemade Veg Meals near Kannuru. Order via WhatsApp."/>

<style>
  :root{
    --bg:#0b0f14;
    --surface:#111827;
    --card:#0f172a;
    --card2:#111a2e;
    --stroke:rgba(255,255,255,.10);
    --text:#f6f7fb;
    --muted:rgba(246,247,251,.68);
    --brand:#20c997;
    --warn:#ffb020;
    --danger:#ff4d4f;
    --shadow: 0 18px 60px rgba(0,0,0,.55);
    --r:16px;
    --max:1120px;
  }
  *{box-sizing:border-box}
  body{
    margin:0; font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    color:var(--text);
    background:
      radial-gradient(1200px 700px at 15% -10%, rgba(32,201,151,.20), transparent 55%),
      radial-gradient(900px 600px at 95% 0%, rgba(255,77,79,.12), transparent 55%),
      linear-gradient(180deg, #080b10, #0b0f14 55%, #080b10);
    min-height:100vh;
  }
  a{color:inherit; text-decoration:none}
  .container{max-width:var(--max); margin:0 auto; padding:14px 14px 110px;}
  header{
    position:sticky; top:0; z-index:50;
    background: rgba(11,15,20,.82);
    backdrop-filter: blur(10px);
    border-bottom:1px solid rgba(255,255,255,.08);
  }
  .headInner{
    max-width:var(--max); margin:0 auto; padding:12px 14px;
    display:flex; justify-content:space-between; gap:12px; align-items:flex-start;
  }
  .brand{
    display:flex; gap:10px; align-items:flex-start; min-width:0;
  }
  .logo{
    width:44px; height:44px; border-radius:14px;
    background: linear-gradient(135deg, rgba(32,201,151,.95), rgba(32,201,151,.45));
    display:grid; place-items:center;
    color:#052015; font-weight:1000;
    border:1px solid rgba(255,255,255,.12);
    flex:0 0 auto;
  }
  .btxt{min-width:0}
  .btxt h1{margin:0; font-size:18px; letter-spacing:-.02em;}
  .btxt .meta{margin-top:4px; font-size:12px; color:var(--muted); line-height:1.35;}
  .chips{display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end}
  .chip{
    font-size:12px; font-weight:800;
    padding:7px 10px; border-radius:999px;
    background: rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.10);
    color:rgba(246,247,251,.90);
    white-space:nowrap;
  }
  .chip.green{background: rgba(32,201,151,.12); border-color: rgba(32,201,151,.25); color:#caffef;}
  .chip.red{background: rgba(255,77,79,.14); border-color: rgba(255,77,79,.30); color:#ffe1e1;}

  /* search + layout */
  .topRow{display:grid; grid-template-columns: 1fr 340px; gap:14px; margin-top:14px;}
  @media(max-width:980px){ .topRow{grid-template-columns:1fr;} }
  .panel{
    background: rgba(18,24,36,.72);
    border:1px solid rgba(255,255,255,.10);
    border-radius: 22px;
    box-shadow: var(--shadow);
    overflow:hidden;
  }
  .pad{padding:14px;}
  .searchBox{
    display:flex; gap:10px; align-items:center;
    padding:12px 12px;
    border-radius: 16px;
    background: rgba(0,0,0,.18);
    border:1px solid rgba(255,255,255,.10);
  }
  .searchBox input{
    width:100%; border:0; outline:0;
    background: transparent; color:var(--text);
    font-size:14px;
  }
  .searchIcon{opacity:.8}

  /* category tabs */
  .tabs{
    display:flex; gap:10px; overflow:auto; padding:12px 14px;
    border-top:1px solid rgba(255,255,255,.06);
    border-bottom:1px solid rgba(255,255,255,.06);
    background: rgba(0,0,0,.18);
    scrollbar-width:none;
  }
  .tabs::-webkit-scrollbar{display:none}
  .tab{
    flex:0 0 auto;
    padding:9px 12px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,.10);
    background: rgba(255,255,255,.06);
    color:rgba(246,247,251,.92);
    font-weight:900;
    font-size:12px;
    cursor:pointer;
    user-select:none;
    transition:.12s transform ease, .12s background ease;
  }
  .tab:hover{transform: translateY(-1px); background: rgba(255,255,255,.09);}
