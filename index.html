<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --cream:#FFF8F0;--brown:#2C1810;--orange:#E8611A;--gold:#D4A017;--green:#3D6B4F;
  --light:#FEF3E8;--text:#1A0F0A;--muted:#7A5C4A;--white:#FFFFFF;
}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text)}
nav{position:sticky;top:0;z-index:100;background:rgba(255,248,240,0.95);padding:0 5%}
.nav-inner{display:flex;justify-content:space-between;align-items:center;height:64px}
.logo{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--brown)}
.logo span{color:var(--orange)}
.nav-links{display:flex;gap:28px;list-style:none}
.nav-links a{font-size:13px;color:var(--muted);text-decoration:none}
.nav-cta{background:var(--orange);color:white;padding:8px 20px;border-radius:24px;border:none}

/* HERO */
.hero{min-height:80vh;display:flex;align-items:center;padding:0 5%}
.hero-content{max-width:550px}
.hero h1{font-family:'Playfair Display',serif;font-size:52px;color:var(--brown)}
.hero h1 em{color:var(--orange)}
.hero p{color:var(--muted);margin:20px 0}
.btn-primary{background:var(--brown);color:white;padding:12px 26px;border-radius:30px;border:none}
.btn-outline{border:2px solid var(--brown);padding:12px 26px;border-radius:30px}

/* MENU */
section{padding:60px 5%}
.section-title{font-family:'Playfair Display';font-size:32px;color:var(--brown)}
.tab-bar{display:flex;gap:10px;margin:20px 0}
.tab-btn{padding:10px 20px;border-radius:20px;border:1px solid #ccc;cursor:pointer}
.tab-btn.active{background:var(--orange);color:white}
.meal-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:20px}
.meal-item{background:white;border-radius:15px;padding:15px;text-align:center}
.meal-emoji{font-size:40px}
.price{color:var(--orange);font-weight:600}
.tag{font-size:10px;color:green}

/* FOOTER */
footer{background:var(--brown);color:white;padding:30px;text-align:center}
</style>

<!-- NAV -->
<nav>
  <div class="nav-inner">
    <div class="logo">Taste<span>Hub</span></div>
    <ul class="nav-links">
      <li><a href="#">Menu</a></li>
      <li><a href="#">Subscription</a></li>
    </ul>
    <button class="nav-cta">Order Now</button>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <div class="hero-content">
    <h1>Delicious Food,<br><em>Every Day</em></h1>
    <p>Fresh homemade meals delivered in Kannuru & nearby. Order breakfast, lunch, snacks or dinner easily.</p>
    <button class="btn-primary" onclick="document.querySelector('#menu').scrollIntoView()">Explore Menu</button>
    <button class="btn-outline">Subscribe</button>
  </div>
</div>

<!-- MENU -->
<section id="menu">
  <div class="section-title">Our Menu</div>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="showTab('breakfast',this)">Breakfast</button>
    <button class="tab-btn" onclick="showTab('lunch',this)">Lunch</button>
    <button class="tab-btn" onclick="showTab('snacks',this)">Snacks</button>
    <button class="tab-btn" onclick="showTab('dinner',this)">Dinner</button>
  </div>

  <div id="meal-grid" class="meal-grid"></div>
</section>

<!-- FOOTER -->
<footer>
  <p>© 2026 TasteHub | Fresh Meals Daily</p>
</footer>

<script>
const meals = {
  breakfast: [
    {e:"🥞",n:"Masala dosa (2pieces) with sambar chatni",p:"₹130",t:"South Indian"},
    {e:"🍳",n:"Extra dosa",p:"₹50",t:"Bestseller"},
    {e:"🥣",n:"Handvo – A delicious Gujarati dish made with mixed dals, rich in protein and fiber(4 pieces) ",p:"₹100",t:"Light"}
  ],
  lunch: [
    {e:"🍱",n:"Plain Rice with Daal Tadka,Aloo Palak , Salads",p:"₹160",t:"limited"}
  ],
  snacks: [
    {e:"🍕",n:"Onion kachori (2pieces) with Chatni",p:"₹70",t:"Fast Food"}
  ],
  dinner: [
    {e:"🍛",n:"Plain paratha/chapati (4pieces) with chhole",p:"₹140",t:"Combo"},
   ]
};

function showTab(category, btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');

  const grid = document.getElementById('meal-grid');

  grid.innerHTML = meals[category].map(item => `
    <div class="meal-item">
      <div class="meal-emoji">${item.e}</div>
      <h4>${item.n}</h4>
      <div class="price">${item.p}</div>
      <div class="tag">${item.t}</div>
    </div>
  `).join('');
}

document.addEventListener("DOMContentLoaded", () => {
  showTab('breakfast', document.querySelector('.tab-btn'));
});
</script>
