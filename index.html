<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=DM+Sans&display=swap" rel="stylesheet">

<title>TasteHub</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans';background:#FFF8F0}

/* NAV */
nav{
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:15px;
  background:#fff;
}
.logo img{width:60px;border-radius:50%}
.logo-text{font-family:'Playfair Display';font-size:22px;margin-top:5px}
.cart-btn{
  margin-top:10px;
  background:#25D366;
  color:white;
  padding:8px 18px;
  border:none;
  border-radius:20px;
}

/* HERO */
.hero{text-align:center;padding:30px}
.hero h1{font-family:'Playfair Display';font-size:32px}
.hero em{color:#E8611A}

/* SLIDER */
.slider{
  position:relative;
  width:90%;
  margin:20px auto;
  height:160px;
  overflow:hidden;
  border-radius:15px;
}
.slide{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0;
  transition:0.6s;
}
.slide.active{opacity:1}

/* SECTION */
section{padding:30px 5%}
.tab-bar{display:flex;gap:10px;margin:15px 0}
.tab-btn{
  padding:8px 15px;
  border-radius:20px;
  border:1px solid #ccc;
  background:white;
}
.tab-btn.active{background:#E8611A;color:white}

.meal-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:15px;
}
.meal-item{
  background:white;
  padding:15px;
  border-radius:12px;
  text-align:center;
}
.price{color:#E8611A;font-weight:600}

/* INPUT */
input{
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
  width:70%;
}

/* FOOTER */
footer{
  background:#2C1810;
  color:white;
  text-align:center;
  padding:20px;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <div class="logo">
    <img src="logo.png">
  </div>
  <div class="logo-text">TasteHub</div>
  <button class="cart-btn" onclick="sendToWhatsApp()">🛒 Order</button>
</nav>

<!-- HERO -->
<div class="hero">
  <h1>Fresh Homemade Food,<br><em>Delivered Daily</em></h1>
  <p>Serving Kannuru & nearby</p>
</div>

<!-- SLIDER -->
<div class="slider">
  <img src="ad1.png" class="slide active">
  <img src="ad2.png" class="slide">
  <img src="ad3.png" class="slide">
  <img src="ad4.png" class="slide">
  <img src="ad5.png" class="slide">
</div>

<!-- LOCATION -->
<section>
  <h3>Check Delivery</h3><br>
  <input id="locationInput" placeholder="Enter your area">
  <button onclick="checkLocation()">Check</button>
</section>

<!-- MENU -->
<section>
  <h2>Menu</h2>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="showTab('breakfast',this)">Breakfast</button>
    <button class="tab-btn" onclick="showTab('lunch',this)">Lunch</button>
    <button class="tab-btn" onclick="showTab('snacks',this)">Snacks</button>
    <button class="tab-btn" onclick="showTab('dinner',this)">Dinner</button>
  </div>

  <div id="meal-grid" class="meal-grid"></div>
</section>

<!-- PAYMENT -->
<section style="text-align:center">
  <h3>Scan & Pay</h3><br>
  <img src="upi-qr.png" style="width:200px;border-radius:12px">
  <p>After payment click Order</p>
</section>

<footer>
  © 2026 TasteHub | Fresh Meals Daily
</footer>

<script>

/* CART */
let cart=[];

/* MENU DATA */
const meals={
  breakfast:[
    {n:"Masala dosa (2pcs)",p:"₹130"},
    {n:"Extra dosa",p:"₹50"},
    {n:"Handvo (4 pcs)",p:"₹100"}
  ],
  lunch:[
    {n:"Plain rice + daal tadka + aloo palak + salads",p:"₹160"},
    {n:"Chapati available",p:"₹0"}
  ],
  snacks:[
    {n:"Onion kachori (2pcs)",p:"₹70"}
  ],
  dinner:[
    {n:"4 chapati/paratha + chhole",p:"₹140"},
    {n:"Extra chapati",p:"₹15"}
  ]
};

/* SHOW MENU */
function showTab(cat,btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');

  let grid=document.getElementById('meal-grid');

  grid.innerHTML=meals[cat].map(item=>`
    <div class="meal-item">
      <h4>${item.n}</h4>
      <div class="price">${item.p}</div>
      <button onclick="addToCart('${item.n}','${item.p}')">Add</button>
    </div>
  `).join('');
}

/* ADD CART */
function addToCart(name,price){
  cart.push({name,price});
  alert(name+" added");
}

/* WHATSAPP ORDER */
function sendToWhatsApp(){
  if(cart.length==0){alert("Cart empty");return;}

  let msg="Order:%0A";
  let total=0;

  cart.forEach((i,index)=>{
    msg+=`${index+1}. ${i.name} - ${i.price}%0A`;
    total+=parseInt(i.price.replace('₹',''))||0;
  });

  msg+=`%0ATotal: ₹${total}`;

  window.open(`https://wa.me/919632035612?text=${msg}`);
}

/* LOCATION CHECK */
function checkLocation(){
  let loc=document.getElementById("locationInput").value.toLowerCase();
  let areas=["kannuru","whitefield","kr puram"];

  if(areas.some(a=>loc.includes(a))){
    alert("✅ Delivery Available");
  } else{
    alert("❌ Not Available");
  }
}

/* SLIDER */
let slides=document.querySelectorAll(".slide");
let index=0;

function autoSlide(){
  slides.forEach(s=>s.classList.remove("active"));
  index=(index+1)%slides.length;
  slides[index].classList.add("active");
}
setInterval(autoSlide,3000);

/* LOAD */
showTab('breakfast',document.querySelector('.tab-btn'));

</script>

</body>
</html>your
