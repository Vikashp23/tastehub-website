<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TasteHub</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=DM+Sans&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans';background:#FFF8F0}

nav{text-align:center;padding:10px;background:#fff}
nav img{height:60px}

.hero{text-align:center;padding:20px}
.hero h1{font-family:'Playfair Display'}
button{padding:10px 20px;margin:5px;border:none;border-radius:20px;cursor:pointer}
.primary{background:#2C1810;color:white}
.orange{background:#E8611A;color:white}

#timing{background:#fff3cd;padding:10px;margin:10px;border-radius:10px;text-align:center}

section{padding:20px}
.tab-btn{padding:8px 15px;border:1px solid #ccc;margin:5px;border-radius:20px}
.active{background:#E8611A;color:white}

.meal{background:#fff;padding:15px;margin:10px 0;border-radius:10px}
.price{color:#E8611A;font-weight:bold}

.cart{position:fixed;bottom:10px;right:10px;background:#E8611A;color:white;padding:12px;border-radius:30px;cursor:pointer}

footer{text-align:center;background:#2C1810;color:white;padding:20px}
</style>
</head>

<body>

<nav>
<img src="logo.png">
</nav>

<div class="hero">
<h1>TasteHub 🍽</h1>
<p>Fresh homemade food near Kannuru</p>

<a href="https://chat.whatsapp.com/JMvEqWg2awXGj2bXiMV9uD">
<button class="orange">Join WhatsApp Group</button>
</a>

<a href="party.html">
<button class="orange">🎉 Party Orders</button>
</a>

<button class="primary" onclick="orderNow()">Order Now</button>
</div>

<div id="timing">
⏰ Order Timings:<br>
Breakfast before 7AM | Lunch before 12PM | Snacks before 4PM | Dinner before 7PM
</div>

<section>
<h2>Menu</h2>

<button class="tab-btn active" onclick="show('lunch',this)">Lunch</button>
<button class="tab-btn" onclick="show('snacks',this)">Snacks</button>
<button class="tab-btn" onclick="show('dinner',this)">Dinner</button>

<div id="menu"></div>
</section>

<section>
<h2>Subscription Plans</h2>

<div class="meal">
<h4>Weekly Plan</h4>
<p>Lunch + Dinner (5 Days)</p>
<div class="price">₹999</div>
<button onclick="subscribe('Weekly ₹999')">Subscribe</button>
</div>

<div class="meal">
<h4>Monthly Plan</h4>
<p>Lunch + Dinner (20 Days)</p>
<div class="price">₹3499</div>
<button onclick="subscribe('Monthly ₹3499')">Subscribe</button>
</div>
</section>

<section style="text-align:center">
<h3>Scan & Pay</h3>
<img src="upi-qr.png" width="200"><br><br>
<button onclick="paymentDone()">I Have Paid</button>
</section>

<div class="cart" onclick="orderNow()">🛒 Order</div>

<footer>
© 2026 TasteHub
</footer>

<script>
let cart=[];

const data={
lunch:[
 {name:"Plain Rice + Daal Tadka + Aloo Palak + Salad",price:"160"},
 {name:"Chapati Available",price:"15"}
],
snacks:[
 {name:"Onion Kachori (2pcs)",price:"70"}
],
dinner:[
 {name:"4 Chapati/Paratha + Chhole",price:"140"},
 {name:"Extra Chapati",price:"15"}
]
};

function checkLocation(){
 let loc=prompt("Enter your area:");
 if(!loc || !loc.toLowerCase().includes("kannuru")){
   alert("❌ Only Kannuru delivery available");
   return false;
 }
 return true;
}

function isOpen(type){
 let h=new Date().getHours();
 if(type==="lunch" && h>=12) return false;
 if(type==="snacks" && h>=16) return false;
 if(type==="dinner" && h>=19) return false;
 return true;
}

function show(type,btn){
 document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
 btn.classList.add('active');

 let html="";

 if(!isOpen(type)){
  html="<b style='color:red'>❌ Ordering closed</b>";
 }else{
  data[type].forEach(item=>{
   html+=`
   <div class="meal">
   <h4>${item.name}</h4>
   <div class="price">₹${item.price}</div>
   <button onclick="add('${item.name}')">Add</button>
   </div>`;
  });
 }

 document.getElementById("menu").innerHTML=html;
}

function add(item){
 cart.push(item);
 alert("Added: "+item);
}

function orderNow(){
 if(!checkLocation()) return;

 if(cart.length===0){
  alert("Cart empty");
  return;
 }

 let msg="Hello TasteHub,%0AOrder:%0A";
 cart.forEach(i=>msg+="- "+i+"%0A");

 window.open("https://wa.me/919632035612?text="+msg);
}

function subscribe(plan){
 let msg="Hello, I want "+plan+" plan";
 window.open("https://wa.me/919632035612?text="+encodeURIComponent(msg));
}

function paymentDone(){
 let msg="I have completed payment, please confirm.";
 window.open("https://wa.me/919632035612?text="+encodeURIComponent(msg));
}

show('lunch',document.querySelector('.tab-btn'));
</script>

</body>
</html>
