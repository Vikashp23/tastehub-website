<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TasteHub | Kannuru Nearby Only – Menu & Order</title>
  <meta name="description" content="TasteHub – Homemade Veg Meals near Kannuru. View menu, add to cart, pay via UPI and checkout on WhatsApp." />

  <style>
    :root{
      --bg:#0b0f14;
      --surface:#121824;
      --card:#151e2d;
      --stroke:rgba(255,255,255,.10);
      --text:#f6f7fb;
      --muted:rgba(246,247,251,.72);
      --brand:#20c997;
      --danger:#ff4d4f;
      --warn:#ffb020;
      --shadow: 0 18px 60px rgba(0,0,0,.55);
      --r:18px;
      --r2:24px;
      --max:1120px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(1200px 700px at 15% -10%, rgba(32,201,151,.20), transparent 55%),
        radial-gradient(900px 600px at 95% 0%, rgba(255,77,79,.12), transparent 55%),
        linear-gradient(180deg, #080b10, #0b0f14 55%, #080b10);
      min-height:100vh;
    }
    a{color:inherit}
    .wrap{max-width:var(--max); margin:0 auto; padding:16px 14px 120px;}
    .appbar{
      position:sticky; top:0; z-index:20;
      background: rgba(11,15,20,.78);
      backdrop-filter: blur(10px);
      border-bottom:1px solid rgba(255,255,255,.07);
    }
    .appbarInner{
      max-width:var(--max); margin:0 auto;
      padding:12px 14px;
      display:flex; gap:12px; align-items:center; justify-content:space-between;
    }
    .brandRow{display:flex; gap:10px; align-items:center; min-width:0;}
    .logo{
      width:44px; height:44px; border-radius:14px;
      background: linear-gradient(135deg, rgba(32,201,151,.95), rgba(32,201,151,.45));
      display:grid; place-items:center;
      color:#052015; font-weight:1000;
      overflow:hidden; border:1px solid rgba(255,255,255,.12);
      flex:0 0 auto;
      position:relative;
    }
    .logo img{width:100%; height:100%; object-fit:cover; display:none;}
    .logo span{position:absolute; inset:0; display:grid; place-items:center;}
    .bt{min-width:0}
    .bt h1{
      margin:0; font-size:16px; letter-spacing:-.01em;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .bt p{
      margin:2px 0 0; font-size:12px; color:var(--muted);
      line-height:1.35;
    }
    .chipRow{display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end; align-items:center;}
    .chip{
      font-size:12px; font-weight:800;
      padding:7px 10px;
      border-radius:999px;
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      color:rgba(246,247,251,.90);
      white-space:nowrap;
    }
    .chip.green{background: rgba(32,201,151,.12); border-color: rgba(32,201,151,.25); color:#caffef;}
    .chip.red{background: rgba(255,77,79,.14); border-color: rgba(255,77,79,.30); color:#ffe1e1;}
    .chip.gray{background: rgba(255,255,255,.05); border-color: rgba(255,255,255,.10); color:rgba(246,247,251,.85);}

    .hero{
      margin-top:14px;
      display:grid;
      grid-template-columns: 1.25fr .75fr;
      gap:14px;
    }
    @media (max-width: 900px){ .hero{grid-template-columns:1fr;} }
    .panel{
      background: rgba(18,24,36,.70);
      border:1px solid rgba(255,255,255,.10);
      border-radius: var(--r2);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .pad{padding:14px;}
    .titleRow{
      display:flex; align-items:flex-start; justify-content:space-between; gap:10px; flex-wrap:wrap;
    }
    .titleRow h2{margin:0; font-size:15px; letter-spacing:-.01em;}
    .sub{margin:6px 0 0; color:var(--muted); font-size:13px; line-height:1.35;}

    .tabs{
      display:flex; gap:10px; overflow:auto; padding:12px 14px;
      border-top:1px solid rgba(255,255,255,.06);
      border-bottom:1px solid rgba(255,255,255,.06);
      background: rgba(0,0,0,.18);
      scrollbar-width:none;
    }
    .tabs::-webkit-scrollbar{display:none}
    .tab{
      flex:0 0 auto;
      padding:9px 12px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.06);
      color:rgba(246,247,251,.92);
      font-weight:900;
      font-size:12px;
      cursor:pointer;
      user-select:none;
      transition:.15s transform ease, .15s background ease;
    }
    .tab:hover{transform: translateY(-1px); background: rgba(255,255,255,.09);}
    .tab.active{background: rgba(32,201,151,.14); border-color: rgba(32,201,151,.28); color:#caffef;}

    .sectionTitle{
      margin:10px 0 0;
      padding:0 14px 6px;
      font-size:12px;
      color:rgba(246,247,251,.65);
      text-transform:uppercase;
      letter-spacing:.14em;
      font-weight:1000;
    }
    .sectionInfo{
      margin:0 14px 10px;
      font-size:12px;
      color: rgba(246,247,251,.70);
    }
    .sectionInfo.open{ color: rgba(32,201,151,.95); }
    .sectionInfo.closed{ color: rgba(255,176,32,.95); }
    .sectionInfo.sold{ color: rgba(255,77,79,.95); }

    .menuGrid{
      display:grid;
      grid-template-columns: 1fr;
      gap:10px;
      padding:0 14px 14px;
    }
    .item{
      background: rgba(21,30,45,.75);
      border:1px solid rgba(255,255,255,.10);
      border-radius: var(--r);
      padding:12px;
      display:flex; gap:12px; align-items:flex-start; justify-content:space-between;
    }
    .iLeft{min-width:0;}
    .iTop{display:flex; gap:10px; align-items:center; flex-wrap:wrap;}
    .vegDot{
      width:10px; height:10px; border-radius:3px;
      border:1px solid rgba(32,201,151,.55);
      background: rgba(32,201,151,.25);
      box-shadow: 0 0 0 3px rgba(32,201,151,.08);
    }
    .iname{font-weight:1000; font-size:14px; letter-spacing:-.01em;}
    .iprice{font-weight:1000; font-size:13px; color:#d9ffe9;}
    .idesc{margin:6px 0 0; color:var(--muted); font-size:12.5px; line-height:1.35;}
    .iRight{display:flex; flex-direction:column; gap:8px; align-items:flex-end;}

    .qty{
      display:flex; gap:8px; align-items:center;
      padding:7px 10px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.18);
    }
    .qbtn{
      width:28px; height:28px; border-radius:10px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      color:var(--text);
      font-weight:1000;
      cursor:pointer;
    }
    .qbtn:disabled{opacity:.5; cursor:not-allowed;}
    .qnum{min-width:18px; text-align:center; font-weight:1000; font-size:13px;}
    .addBtn{
      padding:9px 12px;
      border-radius:12px;
      border:1px solid rgba(32,201,151,.30);
      background: rgba(32,201,151,.14);
      color:#caffef;
      font-weight:1000;
      font-size:12px;
      cursor:pointer;
      white-space:nowrap;
    }
    .addBtn.primary{
      background: linear-gradient(135deg, rgba(32,201,151,.95), rgba(32,201,151,.68));
      border:none;
      color:#052015;
    }
    .addBtn:disabled{opacity:.5; cursor:not-allowed;}
    .badgeSold{
      display:inline-flex; align-items:center; gap:6px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(255,77,79,.28);
      background: rgba(255,77,79,.14);
      color:#ffe1e1;
      font-weight:1000;
      font-size:12px;
      white-space:nowrap;
    }

    .emptyState{
      padding:16px;
      border-radius:18px;
      border:1px dashed rgba(255,255,255,.18);
      background: rgba(0,0,0,.14);
      color: rgba(246,247,251,.90);
    }
    .emptyTitle{ font-weight:1000; margin-bottom:6px; }
    .emptySub{ font-size:12px; color: rgba(246,247,251,.65); line-height:1.35; }

    .stack{display:grid; gap:12px;}
    .links{display:grid; gap:10px; margin-top:10px;}
    .linkBtn{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      padding:12px 12px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06);
      text-decoration:none;
      color:var(--text);
      transition: transform .12s ease, background .12s ease;
    }
    .linkBtn:hover{transform: translateY(-1px); background: rgba(255,255,255,.09);}
    .lL{display:flex; gap:10px; align-items:center; min-width:0;}
    .ic{
      width:34px; height:34px; border-radius:12px;
      display:grid; place-items:center;
      background: rgba(0,0,0,.22);
      border:1px solid rgba(255,255,255,.12);
      flex:0 0 auto;
    }
    .lt{min-width:0;}
    .lt .t{font-weight:1000; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
    .lt .s{font-size:12px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
    .arr{opacity:.8; font-size:18px;}

    /* Right-side floating social */
    .floatSocial{
      position:fixed;
      right:14px;
      top:110px;
      display:flex;
      flex-direction:column;
      gap:10px;
      z-index:80;
    }
    .floatBtn{
      width:46px; height:46px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(18,24,36,.75);
      backdrop-filter: blur(10px);
      display:grid; place-items:center;
      box-shadow: 0 10px 24px rgba(0,0,0,.35);
      text-decoration:none;
      font-weight:1000;
    }

    .cartBar{
      position:fixed; left:0; right:0; bottom:0; z-index:50;
      background: rgba(11,15,20,.88);
      backdrop-filter: blur(10px);
      border-top:1px solid rgba(255,255,255,.10);
    }
    .cartInner{
      max-width:var(--max); margin:0 auto;
      padding:12px 14px;
      display:flex; gap:12px; align-items:center; justify-content:space-between;
    }
    .cartLeft{min-width:0}
    .cartLeft .c1{font-weight:1000; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
    .cartLeft .c2{font-size:12px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
    .checkoutBtn{
      padding:12px 14px;
      border-radius:14px;
      border:none;
      background: linear-gradient(135deg, rgba(32,201,151,.95), rgba(32,201,151,.70));
      color:#052015;
      font-weight:1100;
      cursor:pointer;
      white-space:nowrap;
    }
    .ghostBtn{
      padding:12px 12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      color:var(--text);
      font-weight:1000;
      cursor:pointer;
      white-space:nowrap;
    }
    .warnBtn{
      padding:12px 12px;
      border-radius:14px;
      border:1px solid rgba(255,176,32,.35);
      background: rgba(255,176,32,.14);
      color:#ffe6b5;
      font-weight:1000;
      cursor:pointer;
      white-space:nowrap;
    }

    .drawerOverlay{
      position:fixed; inset:0; z-index:60;
      background: rgba(0,0,0,.55);
      display:none;
      align-items:flex-end;
      justify-content:center;
      padding:14px;
    }
    .drawer{
      width:min(780px, 100%);
      background: rgba(18,24,36,.92);
      border:1px solid rgba(255,255,255,.10);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow:hidden;
      max-height: 90vh;
      display:flex;
      flex-direction:column;
    }
    .drawerHead{
      padding:14px;
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      border-bottom:1px solid rgba(255,255,255,.08);
    }
    .drawerHead h3{margin:0; font-size:15px;}
    .closeBtn{
      width:40px; height:40px; border-radius:14px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      color:var(--text);
      font-weight:1000;
      cursor:pointer;
    }
    .drawerBody{padding:14px; overflow:auto;}
    .cartList{display:grid; gap:10px;}
    .cartItem{
      display:flex; align-items:center; justify-content:space-between; gap:12px;
      background: rgba(0,0,0,.18);
      border:1px solid rgba(255,255,255,.10);
      border-radius: 16px;
      padding:12px;
    }
    .cartItem .name{font-weight:1000; font-size:13px; margin:0 0 2px;}
    .cartItem .meta{font-size:12px; color:var(--muted);}
    .cartItem .right{display:flex; align-items:center; gap:10px;}
    .drawerFoot{
      padding:14px;
      border-top:1px solid rgba(255,255,255,.08);
      display:grid; gap:12px;
      background: rgba(0,0,0,.12);
    }
    .formGrid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
    @media (max-width: 560px){ .formGrid{grid-template-columns:1fr;} }
    label{font-size:12px; color:rgba(246,247,251,.78); font-weight:900;}
    input, textarea, select{
      width:100%;
      background: rgba(0,0,0,.18);
      border:1px solid rgba(255,255,255,.12);
      color:var(--text);
      border-radius:14px;
      padding:10px 12px;
      outline:none;
      font-size:14px;
    }
    textarea{min-height:70px; resize:vertical;}
    .mutedSmall{font-size:12px; color:rgba(246,247,251,.60); line-height:1.35;}

    .payBox{
      margin-top:10px;
      padding:12px;
      border-radius:18px;
      border:1px solid rgba(32,201,151,.20);
      background: rgba(32,201,151,.08);
      display:none;
    }
    .payRow{
      display:flex; gap:14px; align-items:flex-start; flex-wrap:wrap;
    }
    .qr{
      width:200px; height:200px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.18);
      display:grid; place-items:center;
      overflow:hidden;
    }
    .qr img{width:100%; height:100%; object-fit:cover;}
    .payMeta{min-width:240px; flex:1;}
    .mono{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size:12.5px;
      padding:8px 10px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.18);
      overflow:auto;
    }
  </style>
</head>
