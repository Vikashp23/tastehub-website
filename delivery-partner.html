<!DOCTYPE html>
<html>
<head>
<title>Join TasteHub Delivery Team</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#0b0f14;
color:white;
padding:20px;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
}

button{
padding:12px;
background:#20c997;
border:none;
font-weight:bold;
width:100%;
}

</style>

</head>

<body>

<h2>🏍 Join TasteHub Delivery Team</h2>

<p>Deliver homemade food in Raaga & nearby Kannuru societies.</p>

<form>

<label>Full Name</label>
<input type="text">

<label>Phone Number</label>
<input type="tel">

<label>Vehicle</label>
<select>
<option>2 Wheeler</option>
</select>

<label>Area</label>
<input type="text" placeholder="Kannuru / Nearby area">

<label>Available Time</label>
<select>
<option>Breakfast</option>
<option>Lunch</option>
<option>Snacks</option>
<option>Dinner</option>
</select>

<button>Apply</button>

</form>

</body>
</html>
